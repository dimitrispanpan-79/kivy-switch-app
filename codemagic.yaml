workflows:
  android-build:
    name: Android Build
    max_build_duration: 90
    environment:
      python: 3.10  # Codemagic-supported Python version with distutils
      vars:
        ANDROID_HOME: /opt/android-sdk-linux
    scripts:
      # Upgrade pip
      - pip install --upgrade pip
      # Install Buildozer and Python dependencies
      - pip install kivy openpyxl cython buildozer
      # Check Buildozer
      - buildozer --version
      # Build APK
      - buildozer android debug
    artifacts:
      - bin/*.apk